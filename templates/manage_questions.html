<!DOCTYPE html>
<html>
<head>
    <title>Quiz App - Manage Questions</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:40px; }
        .container { background:rgba(255,255,255,0.95); width:100%; max-width:1200px; border-radius:24px; padding:30px; box-shadow:0 20px 40px rgba(0,0,0,0.15); border:1px solid rgba(255,255,255,0.2); }
        h2 { margin-bottom:24px; color:#333; font-size:32px; text-align:center; }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:14px 12px; text-align:left; border-bottom:1px solid #e8e8e8; }
        th { background:#f4f6ff; color:#333; font-weight:700; }
        tbody tr:hover { background:rgba(102,126,234,0.05); }
        .badge { display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; color:white; }
        .easy { background:#28a745; }
        .medium { background:#ffc107; }
        .hard { background:#dc3545; }
        .category { background:#6f42c1; }
        .action-buttons a { margin-right:10px; text-decoration:none; padding:10px 14px; border-radius:10px; color:white; font-size:14px; }
        .edit-btn { background:#667eea; }
        .delete-btn { background:#dc3545; }
        .top-actions { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; margin-bottom:20px; }
        .top-actions a { text-decoration:none; padding:14px 22px; border-radius:14px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; font-weight:700; }
        @media (max-width: 900px) { body { padding:20px; } .container { padding:20px; } table, thead, tbody, tr, th, td { display:block; } tr { margin-bottom:20px; } th { display:none; } td { padding-left:50%; position:relative; } td::before { position:absolute; left:16px; top:14px; width:45%; white-space:nowrap; font-weight:700; } td:nth-of-type(1)::before { content:'Question'; } td:nth-of-type(2)::before { content:'Level'; } td:nth-of-type(3)::before { content:'Category'; } td:nth-of-type(4)::before { content:'Actions'; } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Manage Questions</h2>
        <div class="top-actions">
            <a href="/admin">Admin Panel</a>
            <a href="/create">Add New Question</a>
        </div>
        {% if questions %}
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Question</th>
                        <th>Level</th>
                        <th>Category</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for q in questions %}
                    <tr>
                        <td>{{ q[1] }}</td>
                        <td><span class="badge {{ q[7] }}">{{ q[7] }}</span></td>
                        <td><span class="badge category">{{ q[8] }}</span></td>
                        <td class="action-buttons">
                            <a href="/edit_question/{{ q[0] }}" class="edit-btn">Edit</a>
                            <a href="/delete_question/{{ q[0] }}" class="delete-btn">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <p>No questions available yet. Add some quizzes from the Create Quiz page.</p>
        {% endif %}
    </div>
</body>
</html>
