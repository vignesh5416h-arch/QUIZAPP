<!DOCTYPE html>
<html>
<head>
    <title>Quiz App - Student Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.1);
            z-index: 1;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 2;
            animation: slideIn 0.6s ease-out;
            text-align: center;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .level-button {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .level-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .level-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .level-button:hover::before {
            left: 100%;
        }

        .level-button:active {
            transform: translateY(0);
        }

        .other-links {
            margin-top: 30px;
        }

        .other-links a {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .other-links a:hover {
            background: linear-gradient(135deg, #5a6268, #6c757d);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .logout-link {
            position: absolute;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 500;
            padding: 12px 20px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 3;
            font-size: 14px;
        }

        .logout-link:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .container {
                padding: 25px;
                margin: 20px;
            }

            h2 {
                font-size: 24px;
            }

            .level-button {
                padding: 15px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="container">
        <h2>Welcome to Quiz App</h2>
        <p>Choose a category and difficulty to begin your quiz:</p>

        {% if error %}
        <div style="margin: 20px 0; padding: 16px; border-radius: 12px; background: #f8d7da; color: #842029; border: 1px solid #f5c2c7;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/quiz" method="get" style="width: 100%; text-align: left; margin-top: 20px;">
            <div style="margin-bottom: 20px;">
                <label for="level" style="font-weight: 600; color: #333; display: block; margin-bottom: 10px;">Difficulty Level</label>
                <select id="level" name="level" style="width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #e9ecef; font-size: 16px;">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div style="margin-bottom: 20px;">
                <label for="category" style="font-weight: 600; color: #333; display: block; margin-bottom: 10px;">Category</label>
                <select id="category" name="category" style="width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #e9ecef; font-size: 16px;">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="level-button">Start Quiz</button>
        </form>

        <div class="other-links">
            <a href="/quiz_history">Quiz History</a>
            <a href="/leaderboard">View Leaderboard</a>
            <a href="/category_leaderboard">Category Stats</a>
        </div>
    </div>
    <a href="/logout" class="logout-link">Logout</a>
</body>
</html>
